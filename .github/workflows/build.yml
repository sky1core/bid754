name: CI

on:
  push:
    # Branch pushes only: release tags point at already-tested commits, so
    # tag pushes would just rerun the same commit (3 duplicate runs per
    # release) and burn external-download quota.
    branches: ["**"]
  pull_request:

jobs:
  portable-test:
    name: Portable Test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-14]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: bid754-go/go.mod
          cache-dependency-path: "**/go.sum"

      - name: Set up Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Set up Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: bid754-codec-js/package-lock.json

      # test-bidcodec (devtools/scripts/test_bidcodec.sh) requires rg, which
      # hosted runners do not ship by default.
      - name: Install ripgrep
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            sudo apt-get update
            sudo apt-get install -y ripgrep
          else
            brew install ripgrep
          fi

      - name: Verify required toolchains
        run: |
          go version
          rustc --version
          cargo --version
          javac -version
          java -version
          python3 --version
          npm --version
          swift --version
          rg --version

      - name: Verify generated artifacts
        run: make verify-generated

      - name: Run Go and Rust tests
        run: make test-all

      - name: Run doctor
        run: make doctor

  # Linux arm64: Intel BID C oracle does not build here (upstream makefile is
  # x86-only), so this job verifies the operational paths (Go portable + Rust)
  # and the platform-independent fixed vectors instead of native FFI bit-compare.
  # See PLATFORM_SPEC.md section 1 and 4.
  portable-arm64-linux:
    name: Portable arm64 Linux
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: bid754-go/go.mod
          cache-dependency-path: "**/go.sum"

      - name: Set up Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Verify toolchains
        run: |
          go version
          uname -m
          rustc --version

      - name: Prepare pinned generation inputs (internal/cgen and internal/csymbols read the extracted Intel BID C sources)
        run: bash ./devtools/scripts/setup_generation_inputs.sh intel

      - name: Run Go module tests (includes fixed string vectors)
        run: make test-go-modules

      - name: Run Rust portable tests (fixed string/codec vectors; readtest is ffi-native, run in native job)
        run: make test-rust

  # Native FFI bit-compare against the live Intel BID C oracle, run on both
  # platforms where Intel BID builds (Linux amd64 and macOS arm64). Together
  # with the portable arm64 Linux job above these cross-cover the guaranteed
  # matrix. See PLATFORM_SPEC.md section 4.
  native:
    name: Native (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-14]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: bid754-go/go.mod
          cache-dependency-path: "**/go.sum"

      - name: Prepare pinned generation inputs (Intel BID C sources and IBM decTest originals)
        run: bash ./devtools/scripts/setup_generation_inputs.sh

      - name: Install IBM decNumber
        run: bash ./devtools/scripts/install_ibm_decnumber.sh

      - name: Prepare Intel BID and env (-ffp-contract=off)
        run: bash ./devtools/scripts/setup_c_libs.sh

      - name: Run doctor
        run: make doctor

      - name: Run native smoke tests
        run: make test-native-smoke

      - name: Run generated FFI bit-compare
        run: make test-native-ffi

      - name: Run generated readtest suites
        run: make test-native-readtest

      - name: Run generated decTest suites
        run: make test-native-dectest

      - name: Run Rust native tests (readtest vs Intel BID oracle)
        run: make test-rust-native

  script-check:
    name: Shell Script Check
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Validate shell scripts
        run: make check-scripts
